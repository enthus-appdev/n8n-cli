version: 2

project_name: n8nctl

builds:
  - main: ./cmd/n8nctl
    binary: n8nctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/enthus-appdev/n8n-cli/internal/cmd.version={{.Version}}
      - -X github.com/enthus-appdev/n8n-cli/internal/cmd.commit={{.ShortCommit}}
      - -X github.com/enthus-appdev/n8n-cli/internal/cmd.date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  github:
    owner: enthus-appdev
    name: n8n-cli
  header: |
    ## Installation

    ### Homebrew (macOS and Linux)
    ```bash
    brew install enthus-appdev/tap/n8nctl
    ```

    ### Binary download
    Download the archive for your platform below, extract, and add to your PATH.

brews:
  - name: n8nctl
    repository:
      owner: enthus-appdev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/enthus-appdev/n8n-cli
    description: "CLI for managing n8n workflows - pull, push, execute, activate"
    license: MIT
    commit_author:
      name: enthus-appdev-tap-bumper[bot]
      email: 275364917+enthus-appdev-tap-bumper[bot]@users.noreply.github.com
    commit_msg_template: "chore(formula): bump {{ .ProjectName }} to {{ .Tag }}"
    test: |
      assert_match version.to_s, shell_output("#{bin}/n8nctl version")
    install: |
      bin.install "n8nctl"
